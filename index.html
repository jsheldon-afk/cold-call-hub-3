<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seated · Cold Call Hub v2</title>
<script src="data.js"></script>
<style>
  :root {
    --blue:#185FA5; --blue-lt:#EBF4FF; --blue-mid:#378ADD;
    --green:#0F6E56; --green-lt:#E1F5EE;
    --purple:#3C3489; --purple-lt:#EEEDFE;
    --orange:#854F0B; --orange-lt:#FFF8F0;
    --border:#E0DDD6; --bg:#F5F4F0; --white:#FFFFFF;
    --text:#1A1A1A; --muted:#888888;
    --script-bg:#EBF4FF; --script-text:#0C447C;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

  /* TOP BAR */
  .topbar { background:var(--blue); color:white; padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar h1 { font-size:16px; font-weight:600; letter-spacing:0.02em; }
  .topbar span { font-size:11px; opacity:0.7; }

  /* SEARCH */
  .search-bar { background:var(--white); border-bottom:1px solid var(--border); padding:12px 24px; position:sticky; top:52px; z-index:99; }
  .search-wrap { position:relative; max-width:480px; }
  .search-wrap input { width:100%; padding:9px 14px 9px 38px; font-size:14px; border:1.5px solid var(--border); border-radius:8px; outline:none; background:var(--bg); transition:border-color 0.15s; }
  .search-wrap input:focus { border-color:var(--blue); background:var(--white); }
  .search-wrap .icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none; }
  .search-hint { font-size:11px; color:var(--muted); margin-top:6px; }

  /* DROPDOWN */
  .dropdown { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--white); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.12); max-height:320px; overflow-y:auto; z-index:200; }
  .dropdown-item { padding:10px 14px; cursor:pointer; border-bottom:0.5px solid var(--border); }
  .dropdown-item:last-child { border-bottom:none; }
  .dropdown-item:hover { background:var(--blue-lt); }
  .d-name { font-weight:500; }
  .d-meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .d-chips { display:flex; gap:4px; margin-top:3px; flex-wrap:wrap; }

  /* LAYOUT */
  .main { max-width:1200px; margin:0 auto; padding:20px 24px; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:900px){ .main { grid-template-columns:1fr; } }

  /* CARDS */
  .card { background:var(--white); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .card-header { padding:10px 14px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--white); background:var(--blue-mid); }
  .card-header.dark { background:var(--blue); }

  /* RESTAURANT NAME BANNER */
  .rest-banner { padding:12px 14px; border-bottom:0.5px solid var(--border); }
  .rest-banner .r-name { font-size:17px; font-weight:600; color:var(--text); margin-bottom:5px; }
  .rest-banner .r-chips { display:flex; gap:6px; flex-wrap:wrap; }

  /* INFO ROWS */
  .info-row { display:grid; grid-template-columns:145px 1fr; border-bottom:0.5px solid var(--border); }
  .info-row:last-child { border-bottom:none; }
  .info-label { padding:8px 10px 8px 10px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); background:#FAFAFA; display:flex; align-items:flex-start; padding-top:9px; }
  .info-label.stat { color:var(--blue); background:var(--blue-lt); }
  .info-val { padding:8px 10px; font-size:13px; color:var(--text); line-height:1.5; }
  .info-val.empty { color:#CCC; font-style:italic; }
  .mkt-subhdr { padding:8px 10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--white); background:var(--blue-mid); grid-column:1/-1; }

  /* CHIPS */
  .chip { padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; display:inline-block; }
  .chip-cuisine { background:var(--green-lt); color:var(--green); }
  .chip-price   { background:var(--purple-lt); color:var(--purple); }
  .chip-market  { background:var(--blue-lt); color:var(--blue); }
  .chip-acc     { background:#FCEBEB; color:#A32D2D; }

  /* NAMEDROPPER TABS */
  .nd-tabs { display:flex; border-bottom:1px solid var(--border); }
  .nd-tab { flex:1; padding:8px; text-align:center; font-size:11px; font-weight:600; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all 0.15s; }
  .nd-tab.active-partner { color:var(--green); border-bottom-color:var(--green); background:var(--green-lt); }
  .nd-tab.active-bilt    { color:var(--purple); border-bottom-color:var(--purple); background:var(--purple-lt); }
  .nd-tab.active-dinova  { color:var(--blue); border-bottom-color:var(--blue); background:var(--blue-lt); }
  .nd-items { padding:8px 0; }
  .nd-item { display:flex; align-items:flex-start; gap:10px; padding:8px 12px; border-bottom:0.5px solid var(--border); }
  .nd-item:last-child { border-bottom:none; }
  .nd-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:4px; }
  .dot-green  { background:#1D9E75; }
  .dot-purple { background:#534AB7; }
  .dot-blue   { background:var(--blue-mid); }
  .nd-body { flex:1; min-width:0; }
  .nd-name { font-size:13px; font-weight:500; color:var(--text); }
  .nd-meta { display:flex; gap:8px; margin-top:3px; flex-wrap:wrap; align-items:center; }
  .nd-badge { font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; }
  .nd-badge-price  { background:var(--purple-lt); color:var(--purple); }
  .nd-badge-dist   { background:#F0F0F0; color:#555; }
  .nd-badge-gmv    { background:#E6F7EE; color:#0A5E36; }
  .nd-badge-tag    { background:#FFF3E0; color:#E65100; }
  .nd-empty { padding:14px 12px; color:var(--muted); font-style:italic; font-size:12px; text-align:center; }

  /* MATCH SIGNALS */
  .signals { display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; }
  .sig { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .sig-partner { background:var(--green-lt); color:var(--green); }
  .sig-bilt    { background:var(--purple-lt); color:var(--purple); }
  .sig-dinova  { background:var(--blue-lt); color:var(--blue); }
  .sig-acc     { background:#FCEBEB; color:#A32D2D; }
  .sig-none    { color:var(--muted); font-style:italic; font-size:12px; padding:10px 12px; }

  /* RIGHT PANEL TABS */
  .panel-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--white); }
  .panel-tab { padding:10px 16px; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all 0.15s; white-space:nowrap; }
  .panel-tab.active { color:var(--blue); border-bottom-color:var(--blue); background:var(--blue-lt); }
  .panel-content { display:none; }
  .panel-content.active { display:block; }

  /* SCRIPT */
  .script-section { border-bottom:0.5px solid var(--border); }
  .script-section:last-child { border-bottom:none; }
  .script-label { padding:7px 12px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--blue); background:var(--script-bg); }
  .script-label.opener-line { border-left:3px solid var(--blue-mid); }
  .script-label.opener-cell { border-left:3px solid #7B9ED9; }
  .script-text { padding:10px 12px; font-size:13px; color:var(--script-text); line-height:1.7; white-space:pre-line; }
  .dir { color:#C0392B; font-style:italic; font-weight:normal; }
  .script-notice { background:#FFF3F3; border:1px solid #FBBCBC; border-radius:6px; padding:7px 12px; font-size:11px; font-weight:700; color:#C0392B; letter-spacing:0.06em; margin:8px 8px 0; }
  .disc-closing { background:#E8F0FB; border-left:3px solid var(--blue); padding:8px 12px; font-size:12px; color:var(--blue); font-weight:600; margin-top:4px; }
  .disc-closing-body { padding:8px 12px; font-size:12px; color:#555; line-height:1.6; white-space:pre-line; }
  .nd-tag        { display:inline; background:#B5D4F4; color:#0C447C; padding:1px 5px; border-radius:3px; font-weight:600; font-size:12px; }
  .nd-tag-bilt   { background:#CECBF6; color:#26215C; }
  .nd-tag-dinova { background:#9FE1CB; color:#085041; }

  /* OBJECTIONS */
  .obj-item { border-bottom:0.5px solid var(--border); }
  .obj-item:last-child { border-bottom:none; }
  .obj-q { padding:8px 12px; font-size:12px; font-weight:700; color:var(--orange); background:var(--orange-lt); }
  .obj-a { padding:8px 12px; font-size:12px; color:#333; line-height:1.6; }

  /* DISCOVERY */
  .disc-item { border-bottom:0.5px solid var(--border); }
  .disc-item:last-child { border-bottom:none; }
  .disc-q { padding:8px 12px; font-size:12px; color:var(--blue); background:var(--script-bg); }
  .disc-a { padding:8px 12px; font-size:12px; color:#555; line-height:1.6; }

  /* EMPTY STATE */
  .empty-state { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 40px; text-align:center; gap:12px; color:var(--muted); }
  .empty-state .e-icon { font-size:40px; }
  .empty-state h2 { font-size:18px; font-weight:500; color:#555; }
  .empty-state p { font-size:13px; max-width:380px; line-height:1.6; }

  .footer-note { grid-column:1/-1; text-align:center; font-size:11px; color:var(--muted); font-style:italic; padding:8px 0 20px; }
  .dropdown::-webkit-scrollbar { width:6px; }
  .dropdown::-webkit-scrollbar-thumb { background:#DDD; border-radius:3px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>SEATED &nbsp;·&nbsp; Cold Call Hub</h1>
  <span id="mkt-label"></span>
</div>

<div class="search-bar">
  <div class="search-wrap" id="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search any restaurant..." autocomplete="off" />
    <div class="dropdown" id="dropdown" style="display:none"></div>
  </div>
  <div class="search-hint" id="search-hint">Type a restaurant name to load the full call sheet</div>
</div>

<div class="main" id="main">
  <div class="empty-state">
    <div class="e-icon">📵</div>
    <h2>Search a restaurant to get started</h2>
    <p>Type any prospect name above. You'll get their info, match signals, namedroppers, and a full personalized script.</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

var current = null;
var activeNDTab = 'partner';
var activePanelTab = 'rl';

var input = document.getElementById('search-input');
var dd = document.getElementById('dropdown');

var searchIndex = [];
for (var i = 0; i < PROSPECTS.length; i++) {
  searchIndex.push({ i: i, nl: PROSPECTS[i].name.toLowerCase() });
}

// Build a unique, stable slug for each prospect (for deep-link URLs)
function slugify(s) {
  return String(s || '').toLowerCase()
    .replace(/&/g, ' and ')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}
var slugToIdx = {};
var idxToSlug = [];
var slugCounts = {};
for (var i = 0; i < PROSPECTS.length; i++) {
  var base = slugify(PROSPECTS[i].name) || ('restaurant-' + i);
  var slug = base;
  if (slugCounts[base] === undefined) {
    slugCounts[base] = 1;
  } else {
    slugCounts[base] += 1;
    slug = base + '-' + slugCounts[base];
  }
  slugToIdx[slug] = i;
  idxToSlug[i] = slug;
}

function showDropdown(q) {
  var results = [];
  if (q) {
    for (var i = 0; i < searchIndex.length; i++) {
      if (searchIndex[i].nl.indexOf(q) >= 0) {
        results.push(searchIndex[i]);
        if (results.length >= 12) break;
      }
    }
  } else {
    results = searchIndex.slice(0, 10);
  }
  if (!results.length) { dd.style.display = 'none'; return; }
  var header = q ? '' : '<div style="padding:8px 14px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#aaa">Suggestions</div>';
  var html = header;
  for (var j = 0; j < results.length; j++) {
    var p = PROSPECTS[results[j].i];
    html += '<div class="dropdown-item" onclick="selectProspect(' + results[j].i + ')">';
    html += '<div class="d-name">' + p.name + '</div>';
    html += '<div class="d-meta">' + (p.address || '') + (p.neighborhood ? ' · ' + p.neighborhood : '') + '</div>';
    html += '<div class="d-chips">';
    if (p.cuisine) html += '<span class="chip chip-cuisine">' + p.cuisine + '</span>';
    if (p.price)   html += '<span class="chip chip-price">' + p.price + '</span>';
    if (p.market)  html += '<span class="chip chip-market">' + p.market + '</span>';
    html += '</div></div>';
  }
  dd.innerHTML = html;
  dd.style.display = 'block';
}

input.addEventListener('focus', function() { showDropdown(input.value.trim().toLowerCase()); });
input.addEventListener('input', function() { showDropdown(input.value.trim().toLowerCase()); });
document.addEventListener('click', function(e) {
  if (!document.getElementById('search-wrap').contains(e.target)) dd.style.display = 'none';
});

function selectProspect(idx) {
  current = PROSPECTS[idx];
  activeNDTab = 'partner';
  activePanelTab = 'rl';
  dd.style.display = 'none';
  input.value = current.name;
  document.getElementById('mkt-label').textContent = current.market || '';
  if (window.history && window.history.replaceState && idxToSlug[idx]) {
    window.history.replaceState(null, '', '?r=' + idxToSlug[idx]);
  }
  render();
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pName(field) {
  if (!field) return '';
  var idx = field.indexOf(' ·');
  return idx > 0 ? field.substring(0, idx) : field;
}

function infoRow(label, val, isStat) {
  return '<div class="info-row">'
    + '<div class="info-label' + (isStat ? ' stat' : '') + '">' + label + '</div>'
    + '<div class="info-val' + (val ? '' : ' empty') + '">' + (val || '—') + '</div>'
    + '</div>';
}

function scriptRow(label, text, extraClass, partners, bilts, dinovas) {
  extraClass = extraClass || '';
  partners = partners || [];
  bilts = bilts || [];
  dinovas = dinovas || [];
  var html = text.replace(/\n/g, '<br>');
  for (var i = 0; i < partners.length; i++) {
    if (partners[i]) html = html.split(partners[i]).join('<span class="nd-tag">' + partners[i] + '</span>');
  }
  for (var i = 0; i < bilts.length; i++) {
    if (bilts[i]) html = html.split(bilts[i]).join('<span class="nd-tag nd-tag-bilt">' + bilts[i] + '</span>');
  }
  for (var i = 0; i < dinovas.length; i++) {
    if (dinovas[i]) html = html.split(dinovas[i]).join('<span class="nd-tag nd-tag-dinova">' + dinovas[i] + '</span>');
  }
  return '<div class="script-section">'
    + '<div class="script-label ' + extraClass + '">' + label + '</div>'
    + '<div class="script-text">' + html + '</div>'
    + '</div>';
}

function objRow(q, a) {
  return '<div class="obj-item">'
    + '<div class="obj-q">' + q + '</div>'
    + '<div class="obj-a">' + a + '</div>'
    + '</div>';
}

function discRow(boldQ, tipA) {
  return '<div class="disc-item">'
    + '<div class="disc-q">' + boldQ + '</div>'
    + '<div class="disc-a">' + tipA + '</div>'
    + '</div>';
}

function ndItem(dotClass, name, price, dist, gmv, tag) {
  var html = '<div class="nd-item"><div class="nd-dot ' + dotClass + '"></div><div class="nd-body">';
  html += '<div class="nd-name">' + name + '</div>';
  html += '<div class="nd-meta">';
  if (price) html += '<span class="nd-badge nd-badge-price">' + price + '</span>';
  if (dist)  html += '<span class="nd-badge nd-badge-dist">' + dist + '</span>';
  if (gmv)   html += '<span class="nd-badge nd-badge-gmv">' + gmv + '</span>';
  if (tag)   html += '<span class="nd-badge nd-badge-tag">' + tag + '</span>';
  html += '</div></div></div>';
  return html;
}

function renderNDTab(p) {
  var html = '';
  if (activeNDTab === 'partner') {
    var items = p.partners.filter(function(x) { return x && x.name; });
    if (!items.length) return '<div class="nd-empty">No nearby partners found</div>';
    for (var i = 0; i < items.length; i++) {
      html += ndItem('dot-green', items[i].name, items[i].price, items[i].dist, items[i].gmv, items[i].tag);
    }
  } else if (activeNDTab === 'bilt') {
    var items = p.bilt.filter(function(x) { return x && x.name; });
    if (!items.length) return '<div class="nd-empty">No BILT buildings mapped for this market</div>';
    for (var i = 0; i < items.length; i++) {
      html += ndItem('dot-purple', items[i].name, '', '', '', '');
    }
  } else if (activeNDTab === 'dinova') {
    var items = p.dinova.filter(function(x) { return x && x.name; });
    if (!items.length) return '<div class="nd-empty">No Dinova companies for this market</div>';
    for (var i = 0; i < items.length; i++) {
      html += ndItem('dot-blue', items[i].name, '', '', '', '');
    }
  }
  return html;
}

function render() {
  var p = current;
  if (!p) return;

  var p1 = p.partners[0] || {}, p2 = p.partners[1] || {};
  var p1n = p1.name || '', p2n = p2.name || '';
  var b1 = p.bilt[0] || {}, b2 = p.bilt[1] || {}, b3 = p.bilt[2] || {};
  var d1 = p.dinova[0] || {}, d2 = p.dinova[1] || {}, d3 = p.dinova[2] || {};
  var d1n = d1.name || '', d2n = d2.name || '', d3n = d3.name || '';

  var nbhd = p.neighborhood || 'your neighborhood';
  var accolPhrase = p.accolades
    ? 'you\'re featured in ' + p.accolades
    : 'your Google reviews stood out';
  var biltSafe = p.bilt_safe || '';

  var biltNames = [b1.name, b2.name, b3.name].filter(Boolean);
  var biltPhrase = biltNames.length === 0 ? 'the luxury buildings nearby'
    : biltNames.length === 1 ? biltNames[0] + ' buildings nearby'
    : biltNames.length === 2 ? biltNames[0] + ' and ' + biltNames[1] + ' buildings nearby'
    : biltNames[0] + ', ' + biltNames[1] + ', and ' + biltNames[2] + ' buildings nearby';

  var dinovaNames = [d1n, d2n, d3n].filter(Boolean);
  var dinPhrase = dinovaNames.length === 0 ? 'our corporate dining partners'
    : dinovaNames.length === 1 ? dinovaNames[0]
    : dinovaNames.length === 2 ? dinovaNames[0] + ' and ' + dinovaNames[1]
    : dinovaNames[0] + ', ' + dinovaNames[1] + ', and ' + dinovaNames[2];

  var scriptNotice = '<div class="script-notice">⚑ RED TEXT = DIRECTIONS — DO NOT READ ALOUD</div>';

  // Shared script blocks
  var isNYC = (p.market || '').toLowerCase().indexOf('new york') >= 0;
  var quantify = "We're Seated — a restaurant discovery program partnered with the largest credit card rewards platforms in the country. We power dining for millions of members nationally, work with about " + (isNYC ? "3K restaurants — we're actually based in NYC" : "3,000 restaurants") + ", and we've been doing this for 10 years.";
  var localize  = "In " + nbhd + ", we work with " + (p1n || 'a similar restaurant') + " and " + (p2n || 'another local partner') + " — and we're actively expanding here right now. The reason restaurants like " + p1n + " partner with us is that we're exceptionally good at consistently filling tables — covers they couldn't fill on their own.";
  var personalize = "I came across " + p.name + " — " + accolPhrase + ". " + biltSafe + " And we're connected to " + dinPhrase + " through our corporate dining program. You'd be a really strong fit for our diner base.";
  var sharedClose = "I actually have some time tomorrow at 3 PM — does that work for you?\n\nIf they ask about pricing: 'That's exactly what I want to walk you through — it's easier to show than explain. No set-up costs, not a subscription. Does [time] work?'";
  var rl_lock = "Perfect — I'll send a calendar invite right now. What's the best email?\n\n'Just sent it — if anything comes up, shoot me a text. My number's in the invite.'\n\n'Oh — real quick, what POS system do you use? Just want to confirm compatibility.'";
  var dm_lock = "Perfect — I'll send a calendar invite right now. What's the best email?\n\n'Just sent it.'\n\n'Oh — and listen, I don't want to have to tie you up on your business line next time I follow up. What's the best cell to reach you on?'\n\n[They give it] → 'Perfect — I'll text you a reminder before we hop on.'\n\n[They don't give it out] → 'Totally hear you, not going to spam you — I just know you're always running around and it's easier to text than play phone tag. Also I can send you a link to what we'd be looking at on the call so you can preview it beforehand.'\n\n'Oh — real quick, what POS system do you use?'";

  // RESTAURANT LINE
  var rl_opener = "Hi — I'm calling to extend an invitation to join the Seated network. Could you point me to whoever handles partnerships for " + p.name + "?";
  var rl_gatekeeper = "<span class=\"dir\">[They say they don't do partnerships / 'we don't do that']</span>\n\n'Got it — this isn't a traditional advertising pitch, there's no upfront cost and it's not a subscription. I just want to make sure I'm talking to the right person — who would handle something like adding a new revenue channel or a new customer program? Is that the owner?'\n\n<span class=\"dir\">[Can't transfer / owner unavailable — get their name, a direct number, and best callback time. Only schedule with someone who can approve.]</span>\n\n'What's their name? And is there a better number to reach them directly — a cell or direct line?'";
  var rl_qualify = "<span class=\"dir\">[Once you have the DM]</span>\n'Great — and just so I make sure I'm talking to the right person, what's your role at " + p.name + "?'\n\n<span class=\"dir\">[Owner / final DM] → Skip to Quantify.</span>\n<span class=\"dir\">[GM / Manager]</span>\n'Got it — for something like adding a new partnership, is that something you can approve, or would the owner need to be looped in?'\n<span class=\"dir\">[Can approve] → Proceed to Quantify.</span>\n<span class=\"dir\">[Needs owner]</span>\n'I don't want to make you explain this twice — is the owner available now, or what's the best way to get them on with us?'";

  var rlContent = scriptNotice
    + scriptRow('OPENER', rl_opener, 'opener-line')
    + scriptRow('GATEKEEPER', rl_gatekeeper, 'opener-line')
    + scriptRow('QUALIFY DM', rl_qualify, 'opener-line')
    + scriptRow('QUANTIFY', quantify)
    + scriptRow('LOCALIZE', localize, '', [p1n, p2n])
    + scriptRow('PERSONALIZE', personalize, '', [], biltNames, dinovaNames)
    + scriptRow('CLOSE', sharedClose)
    + scriptRow('LOCK', rl_lock);

  // DM CELL
  var dm_opener = "Hey [Owner Name] — it's [Your Name] over at Seated. I'm not going to keep you long — I wanted to connect about " + p.name + " specifically because " + accolPhrase + ". Are you familiar with Seated?";
  var dm_quantify = "<span class=\"dir\">[Not Familiar]</span>\n" + quantify + "\n\n<span class=\"dir\">[Familiar]</span>\nGot it — so you probably know that we're a restaurant discovery program. We're partnered with the largest credit card rewards platforms in the country, we power dining for millions of members nationally, work with about 3,000 restaurants, and we've been doing this for 10 years.";

  var dmContent = scriptNotice
    + scriptRow('OPENER', dm_opener, 'opener-cell')
    + scriptRow('QUANTIFY', dm_quantify)
    + scriptRow('LOCALIZE', localize, '', [p1n, p2n])
    + scriptRow('PERSONALIZE', personalize, '', [], biltNames, dinovaNames)
    + scriptRow('CLOSE', sharedClose)
    + scriptRow('LOCK', dm_lock);

  // DISCOVERY
  var discContent = ''
    + discRow('<b>What does a typical week look like for you in terms of covers — are there nights you\'re looking to drive more traffic?</b>', 'Listen for patterns in the book. Understand where the gaps are so you can frame the pitch around real need.')
    + discRow("<b>Are you doing anything right now to drive covers — OpenTable promotions, social, anything like that?</b>", "Listen for: gaps in their strategy. If nothing, that's your opening. If a competitor, that's a comparison opportunity.")
    + discRow("<b>Who's your typical guest — neighborhood regulars, destination diners, corporate accounts?</b>", 'Listen for: alignment with BILT residents (young professional, nearby) or Dinova (corporate expense account). Use in your close.')
    + discRow("<b>Just so I make sure I'm talking to the right person — what does the process look like for adding a new partnership? Is that something you can approve, or would the owner need to be looped in?</b>", 'Only ask if unsure you have the DM. Get to the owner if needed.')
    + discRow('<b>What POS system do you use? Just want to confirm compatibility before we hop on.</b>', 'Ask when locking the meeting. Confirms intent and surfaces any ops objection early.')
    + '<div class="disc-closing">CLOSING — Confirm it\'s a priority before you hang up</div>'
    + '<div class="disc-closing-body">\'Based on everything you\'ve shared — this sounds like a strong fit. I want to make sure I\'m not wasting your time: is bringing in more guests something you\'re actively focused on right now?\'\n\n<span class="dir">[Yes / it\'s a priority] → Move straight to closing the meeting.</span>\n<span class="dir">[Back-burner / not right now] → \'Got it — when does that change? I\'ll follow up then. What\'s the best way to reach you?\'</span></div>';

  // OBJECTIONS
  var objContent = ''
    + objRow('"What\'s Seated?"', '<b>Say:</b> "We\'re a restaurant discovery program — partnered with the biggest credit card rewards platforms in the country, think Bilt, Bank of America, and similar. We connect their members — millions of high-intent diners — directly to restaurants like yours. No upfront cost, no subscription. We only make money when we drive you revenue. That\'s the 30-second version — it\'s honestly easier to show than explain. That\'s why I want to grab 20 minutes."')
    + objRow('"Send me an email"', '<b>Say:</b> "Totally — before I do, I just want to make sure this is a good fit. Are you focused on getting more people through the door during the week?<br><br>[Once they engage] → I actually have a slot open tomorrow at 2 PM. Does that work? I\'ll keep it to 20 minutes."')
    + objRow('"Not interested"', '<b>Say:</b> "\'Not interested?\' [mirror — pause]<br><br>\'When you say that, is it a cost thing, or just don\'t want another platform?\'<br><br>[If cost] → No upfront fees, nothing like that.<br>[If ops] → Zero extra work for your staff — ' + (p1n || 'our partner restaurants') + ' run it with no operational changes."')
    + objRow('"What does it cost?"', '<b>Say:</b> "The price is entirely up to you — depends on how much you want to lean into filling empty seats. Makes a lot more sense when I can show you. Does [time] work?<br><br><b>Do NOT quote percentages. Do NOT explain occupancy pricing. Get the meeting.</b>"')
    + objRow('"We\'ve used Seated before"', '<b>Say:</b> "Yeah, I actually see that — we\'ve made some big changes since then. We added luxury building and corporate partnerships and significantly increased our volume. Are you open to hearing what\'s different? I have time tomorrow — does that work?"')
    + objRow('"We\'re too busy"', '<b>Say:</b> "That\'s a great problem to have — and when things slow down, you\'ll want something already in place. We work around your schedule. What does your calendar look like in the next couple weeks?"')
    + objRow('"What is BILT?"', '<b>Say:</b> "It\'s a credit card rewards program built into leases at premium apartment buildings nearby — residents earn points paying rent and redeem them at restaurants close to where they live. ' + biltSafe + ' Worth 20 minutes?"');

  // BUILD LEFT COLUMN
  var ndCount = [p.partners.filter(function(x){return x&&x.name;}).length,
                 p.bilt.filter(function(x){return x&&x.name;}).length,
                 p.dinova.filter(function(x){return x&&x.name;}).length];

  var leftCol = ''
    + '<div class="card">'
    + '<div class="card-header">Restaurant Info</div>'
    + '<div class="rest-banner"><div class="r-name">' + p.name + '</div>'
    + '<div class="r-chips">'
    + (p.cuisine ? '<span class="chip chip-cuisine">' + p.cuisine + '</span>' : '')
    + (p.price   ? '<span class="chip chip-price">' + p.price + '</span>' : '')
    + (p.market  ? '<span class="chip chip-market">' + p.market + '</span>' : '')
    + (p.accolades ? '<span class="chip chip-acc">⭐ ' + p.accolades + '</span>' : '')
    + '</div></div>'
    + infoRow('Phone', p.phone || '')
    + infoRow('Address', p.address)
    + infoRow('Neighborhood', p.neighborhood)
    + infoRow('Zip', p.zip)
    + '<div class="mkt-subhdr">Market Info</div>'
    + infoRow('Market Since', p.mkt_year, true)
    + infoRow('Avg Rev / Restaurant', p.mkt_avg_rev, true)
    + infoRow('Member Count', p.mkt_members, true)
    + infoRow('Monthly Volume', p.mkt_volume, true)
    + '</div>'

    + '<div class="card" style="margin-top:12px">'
    + '<div class="card-header">Match Signals</div>'
    + '<div class="signals">'
    + (p1n ? '<span class="sig sig-partner">✓ Partners nearby</span>' : '')
    + (b1.name ? '<span class="sig sig-bilt">✓ BILT buildings</span>' : '')
    + (d1n ? '<span class="sig sig-dinova">✓ Dinova corporates</span>' : '')
    + (p.accolades ? '<span class="sig sig-acc">✓ ' + p.accolades + '</span>' : '')
    + (!p1n && !b1.name && !d1n && !p.accolades ? '<span class="sig-none">No signals found</span>' : '')
    + '</div></div>'

    + '<div class="card" style="margin-top:12px">'
    + '<div class="card-header">Namedroppers</div>'
    + '<div class="nd-tabs">'
    + '<div class="nd-tab ' + (activeNDTab==='partner'?'active-partner':'') + '" onclick="setNDTab(\'partner\')">Partners (' + ndCount[0] + ')</div>'
    + '<div class="nd-tab ' + (activeNDTab==='bilt'?'active-bilt':'') + '" onclick="setNDTab(\'bilt\')">BILT (' + ndCount[1] + ')</div>'
    + '<div class="nd-tab ' + (activeNDTab==='dinova'?'active-dinova':'') + '" onclick="setNDTab(\'dinova\')">Dinova (' + ndCount[2] + ')</div>'
    + '</div>'
    + '<div class="nd-items" id="nd-items">' + renderNDTab(p) + '</div>'
    + '</div>';

  // BUILD RIGHT COLUMN
  var rightCol = '<div class="card">'
    + '<div class="panel-tabs" style="flex-wrap:wrap">'
    + '<div class="panel-tab ' + (activePanelTab==='rl'?'active':'') + '" onclick="setPanelTab(\'rl\')">📞 Restaurant Line</div>'
    + '<div class="panel-tab ' + (activePanelTab==='dm'?'active':'') + '" onclick="setPanelTab(\'dm\')">📱 DM Cell</div>'
    + '<div class="panel-tab ' + (activePanelTab==='discovery'?'active':'') + '" onclick="setPanelTab(\'discovery\')">🔍 Discovery</div>'
    + '<div class="panel-tab ' + (activePanelTab==='objections'?'active':'') + '" onclick="setPanelTab(\'objections\')">🛡 Objections</div>'
    + '</div>'
    + '<div class="panel-content ' + (activePanelTab==='rl'?'active':'') + '" id="panel-rl">' + rlContent + '</div>'
    + '<div class="panel-content ' + (activePanelTab==='dm'?'active':'') + '" id="panel-dm">' + dmContent + '</div>'
    + '<div class="panel-content ' + (activePanelTab==='discovery'?'active':'') + '" id="panel-discovery">' + discContent + '</div>'
    + '<div class="panel-content ' + (activePanelTab==='objections'?'active':'') + '" id="panel-objections">' + objContent + '</div>'
    + '</div>';

  document.getElementById('main').innerHTML = ''
    + '<div>' + leftCol + '</div>'
    + '<div>' + rightCol + '</div>'
    + '<div class="footer-note">⚑ Goal of every call: schedule the meeting — not explain pricing, not explain the network. Earn 20 minutes on a calendar.</div>';

  document.getElementById('search-hint').textContent = 'Showing: ' + p.name + (p.market ? ' · ' + p.market : '');
}

function setNDTab(tab) {
  activeNDTab = tab;
  var el = document.getElementById('nd-items');
  if (el && current) el.innerHTML = renderNDTab(current);
  var tabs = document.querySelectorAll('.nd-tab');
  var tabNames = ['partner','bilt','dinova'];
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = 'nd-tab' + (tab === tabNames[i] ? ' active-' + tabNames[i] : '');
  }
}

function setPanelTab(tab) {
  activePanelTab = tab;
  var tabs = document.querySelectorAll('.panel-tab');
  var panels = document.querySelectorAll('.panel-content');
  var panelTabs = ['rl','dm','discovery','objections'];
  for (var i = 0; i < tabs.length; i++) {
    if (panelTabs[i] === tab) { tabs[i].classList.add('active'); }
    else { tabs[i].classList.remove('active'); }
  }
  for (var i = 0; i < panels.length; i++) {
    panels[i].classList.remove('active');
  }
  var panel = document.getElementById('panel-' + tab);
  if (panel) panel.classList.add('active');
}

window.selectProspect = selectProspect;
window.setNDTab = setNDTab;
window.setPanelTab = setPanelTab;

// Deep link: if URL has ?r=<slug>, auto-load that restaurant
(function loadFromURL() {
  var match = window.location.search.match(/[?&]r=([^&]+)/);
  if (match) {
    var slug = decodeURIComponent(match[1]);
    if (slugToIdx[slug] !== undefined) selectProspect(slugToIdx[slug]);
  }
})();

}); // end DOMContentLoaded
</script>
</body>
</html>
